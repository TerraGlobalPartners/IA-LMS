// ═══════════════════════════════════════════════════════════════════════════════
// GOOGLE SHEETS API CONFIGURATION
// ═══════════════════════════════════════════════════════════════════════════════
// IMPORTANT: Replace the URL below with YOUR Google Apps Script Web App URL
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbx6SNr-WJP7fsiYi7uZLSIIqXwYrKpUleuK6Xmx36aYNYHWOFin0996QjsaoYTOtwr-LQ/exec";

// API helper functions
window.sheetAPI = {
  get: async function(action, params) {
    try {
      var url = SHEET_API_URL + '?action=' + action;
      if (params) Object.keys(params).forEach(function(k) { url += '&' + k + '=' + encodeURIComponent(params[k]); });
      var resp = await fetch(url);
      return await resp.json();
    } catch(e) { console.error('API GET error:', e); return { error: e.toString() }; }
  },
  post: async function(data) {
    try {
      var resp = await fetch(SHEET_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(data)
      });
      return await resp.json();
    } catch(e) { console.error('API POST error:', e); return { error: e.toString() }; }
  }
};

// Local storage fallback (keeps window.storage for session/cache and offline use)
window.storage = {
  get: function(key) {
    return new Promise(function(resolve) {
      try {
        var v = localStorage.getItem('innovi_' + key);
        resolve(v !== null ? { key: key, value: v, shared: false } : null);
      } catch(e) { resolve(null); }
    });
  },
  set: function(key, value) {
    return new Promise(function(resolve) {
      try {
        localStorage.setItem('innovi_' + key, value);
        resolve({ key: key, value: value, shared: false });
      } catch(e) { resolve(null); }
    });
  },
  delete: function(key) {
    return new Promise(function(resolve) {
      try {
        localStorage.removeItem('innovi_' + key);
        resolve({ key: key, deleted: true, shared: false });
      } catch(e) { resolve(null); }
    });
  },
  list: function(prefix) {
    return new Promise(function(resolve) {
      try {
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k.indexOf('innovi_' + (prefix || '')) === 0) keys.push(k.replace('innovi_', ''));
        }
        resolve({ keys: keys, prefix: prefix, shared: false });
      } catch(e) { resolve({ keys: [], prefix: prefix, shared: false }); }
    });
  }
};
